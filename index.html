<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eletromidia Artifacts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF4F00;
      --black: #000000;
      --white: #FFFFFF;
      --purple: #4E18FF;
      --yellow: #FECC14;
      --pink: #F577ED;
      --green: #3D7700;
      --red: #DC2626;
      --surface: #FAFAFA;
      --muted: #F5F5F5;
      --line: #E5E5E5;
      --text: #737373;
      --radius: 18px;
      --max: 1180px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--surface);
      color: var(--black);
      font-family: "Rethink Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    p { color: var(--text); }

    main {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto; padding: 28px 0 56px;
    }

    /* Hero */
    .hub-hero {
      min-height: 200px; padding: 32px;
      border-radius: var(--radius);
      background: var(--black); color: var(--white);
      position: relative; isolation: isolate;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .hub-hero::before {
      content: ""; position: absolute; z-index: -1;
      right: clamp(80px, 12vw, 180px);
      bottom: clamp(-100px, -8vw, -40px);
      width: min(36vw, 360px);
      aspect-ratio: 1; border-radius: 34px;
      background: var(--orange);
      transform: rotate(10deg);
    }

    .hub-hero::after {
      content: ""; position: absolute; z-index: -1;
      right: clamp(-80px, -6vw, -30px);
      bottom: clamp(-90px, -6vw, -30px);
      width: min(28vw, 280px);
      aspect-ratio: 1; border-radius: 34px;
      background: var(--purple);
      transform: rotate(-8deg);
    }

    .hub-hero h1 {
      font-size: clamp(36px, 5vw, 56px);
      line-height: .96; font-weight: 800;
      margin-bottom: 8px;
    }

    .hub-hero p { color: #D4D4D4; font-size: 17px; max-width: 600px; }

    /* Controls bar */
    .controls {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-bottom: 22px;
    }

    .search-input {
      flex: 1; min-width: 200px;
      padding: 12px 16px; border-radius: 999px;
      border: 1px solid var(--line); background: var(--white);
      font: inherit; font-size: 14px; font-weight: 600;
      outline: none; transition: border-color .15s;
    }

    .search-input:focus { border-color: var(--orange); }

    .search-input::placeholder { color: #B0B0B0; }

    .sort-btn, .copy-prompt-btn {
      padding: 12px 18px; border-radius: 999px;
      border: 1px solid var(--black); background: var(--white);
      font: inherit; font-size: 14px; font-weight: 800;
      cursor: pointer; transition: background .15s, color .15s;
      white-space: nowrap;
    }

    .sort-btn:hover, .sort-btn.active { background: var(--black); color: var(--white); }

    .copy-prompt-btn {
      background: var(--yellow); border-color: var(--yellow);
      color: var(--black); font-size: 13px; padding: 8px 14px;
    }

    .copy-prompt-btn:hover { background: var(--black); color: var(--white); border-color: var(--black); }

    /* Empty state */
    .empty {
      text-align: center; padding: 60px 20px;
      border-radius: var(--radius); border: 2px dashed var(--line);
    }

    .empty h2 { font-size: 28px; margin-bottom: 8px; }
    .empty p { font-size: 16px; max-width: 460px; margin: 0 auto; }

    /* Time sections */
    .time-section { margin-bottom: 28px; }

    .time-section h2 {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 800; line-height: 1;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }

    .time-section h2 .count {
      display: inline-flex; align-items: center;
      padding: 4px 10px; border-radius: 999px;
      background: var(--muted); font-size: 14px;
      font-weight: 700; color: var(--text);
    }

    /* Artifact card */
    .artifact-list { display: grid; gap: 12px; }

    .artifact-card {
      display: grid; grid-template-columns: 1fr auto;
      gap: 16px; align-items: center;
      padding: 20px 24px; border-radius: var(--radius);
      border: 1px solid var(--line); background: var(--white);
      transition: transform .15s, box-shadow .15s;
    }

    .artifact-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.06); }

    .artifact-card h3 {
      font-size: 19px; font-weight: 800; line-height: 1.2;
      margin-bottom: 4px;
    }

    .artifact-card h3 a { transition: color .15s; }
    .artifact-card h3 a:hover { color: var(--orange); }

    .artifact-card .meta {
      font-size: 13px; color: var(--text); font-weight: 600;
      margin-bottom: 6px;
    }

    .artifact-card .desc {
      font-size: 14px; color: var(--text);
      max-width: 640px; line-height: 1.4;
    }

    .artifact-card .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

    .tag {
      display: inline-flex; align-items: center;
      min-height: 24px; padding: 3px 9px;
      border-radius: 999px; font-size: 11px;
      font-weight: 800;
    }

    .tag.orange { background: rgba(255,79,0,.12); color: var(--orange); }
    .tag.purple { background: rgba(78,24,255,.12); color: var(--purple); }
    .tag.green { background: rgba(61,119,0,.14); color: var(--green); }
    .tag.yellow { background: var(--yellow); color: var(--black); }
    .tag.blue { background: rgba(37,99,235,.12); color: #2563EB; }

    .card-actions { display: flex; flex-direction: column; gap: 8px; align-items: center; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 14px 20px; border-radius: 14px;
      background: var(--black); color: var(--white);
      font-weight: 700; font-size: 14px; z-index: 100;
      opacity: 0; transform: translateY(20px);
      transition: all .3s ease; pointer-events: none;
    }

    .toast.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    /* Footer */
    footer {
      margin-top: 28px; padding: 20px 0 0;
      border-top: 1px solid var(--line);
      color: var(--text); font-size: 13px;
      display: flex; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }

    @media (max-width: 640px) {
      .artifact-card { grid-template-columns: 1fr; }
      .card-actions { flex-direction: row; }
      .hub-hero { padding: 24px; min-height: 160px; }
    }
  </style>
</head>

    // ============================================================
    // Hub logic
    // ============================================================
    var sortNewest = true;

    function timeBucket(dateStr) {
      var d = new Date(dateStr + "T00:00:00");
      var now = new Date();
      now.setHours(0,0,0,0);
      var diffDays = Math.floor((now - d) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return "Hoje";
      if (diffDays === 1) return "Ontem";
      if (diffDays <= 7) return "Última semana";
      if (diffDays <= 30) return "Último mês";
      return "Anteriores";
    }

    function buildPrompt(artifact) {
      return "Continue iterando o artefato em https://iskisraell.github.io/em-artifacts/" + artifact.slug + "/\n" +
        "Design system: Eletromidia — Rethink Sans, #FF4F00 orange, flat design, border-radius 18px, sem sombras, sem gradientes.\n" +
        "Componentes disponíveis: hero, pills, nav, grid 12 colunas, cards coloridos, tabs, flow board, before/after split, syntax boxes, tabelas, accordions, change list, callouts, rail steps, filter demo, toasts, counters, problem strip, stamps, checklists, métricas, footer.\n" +
        "Idioma padrão: português (pt-BR).\n" +
        "Contexto do artefato: " + artifact.title + " — " + (artifact.description || "") + "\n" +
        "Seções existentes: " + (artifact.sections || []).join(", ") + "\n" +
        "Meu pedido: ";
    }

    function showToast(msg) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('visible');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(function() { toast.classList.remove('visible'); }, 2000);
    }

    function copyPrompt(artifact) {
      var text = buildPrompt(artifact);
      navigator.clipboard.writeText(text).then(function() {
        showToast("Prompt copiado! Cole em qualquer agente.");
      }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed'; ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast("Prompt copiado!");
      });
    }

    function formatDate(dateStr) {
      var d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function renderArtifactCard(artifact) {
      var tagsHtml = (artifact.tags || []).map(function(t, i) {
        var colors = ['orange','purple','green','yellow','blue'];
        var cls = colors[i % colors.length];
        return '<span class="tag ' + cls + '">' + escapeHtml(t) + '</span>';
      }).join('');

      return '<article class="artifact-card">' +
        '<div>' +
          '<h3><a href="' + artifact.slug + '/">' + escapeHtml(artifact.title) + '</a></h3>' +
          '<div class="meta">' + formatDate(artifact.date) + '</div>' +
          '<div class="desc">' + escapeHtml(artifact.description || '') + '</div>' +
          '<div class="tags">' + tagsHtml + '</div>' +
        '</div>' +
        '<div class="card-actions">' +
          '<button class="copy-prompt-btn" onclick="copyPrompt(artifacts[' + artifacts.indexOf(artifact) + '])" title="Copiar prompt para continuar iterando">Copiar prompt</button>' +
        '</div>' +
      '</article>';
    }

    function groupByTime(filtered) {
      var order = ['Hoje', 'Ontem', 'Última semana', 'Último mês', 'Anteriores'];
      var groups = {};
      order.forEach(function(o) { groups[o] = []; });
      filtered.forEach(function(a) {
        var bucket = timeBucket(a.date);
        if (groups[bucket]) groups[bucket].push(a);
        else groups['Anteriores'].push(a);
      });
      return order.filter(function(o) { return groups[o].length > 0; }).map(function(o) {
        return { bucket: o, artifacts: groups[o] };
      });
    }

    function render() {
      var query = (document.getElementById('search').value || '').toLowerCase().trim();
      var filtered = artifacts.filter(function(a) {
        if (!query) return true;
        var haystack = (a.title + ' ' + (a.description || '') + ' ' + (a.tags || []).join(' ')).toLowerCase();
        return haystack.indexOf(query) !== -1;
      });

      if (sortNewest) {
        filtered.sort(function(a, b) { return b.date.localeCompare(a.date); });
      } else {
        filtered.sort(function(a, b) { return a.date.localeCompare(b.date); });
      }

      var container = document.getElementById('content');

      if (filtered.length === 0 && artifacts.length === 0) {
        container.innerHTML = '<div class="empty"><h2>Nenhum artefato ainda.</h2><p>Os artefatos aparecerão aqui conforme forem gerados e publicados.</p></div>';
        return;
      }

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty"><h2>Nenhum resultado.</h2><p>Tente outro termo de busca.</p></div>';
        return;
      }

      var groups = groupByTime(filtered);
      var html = '';
      groups.forEach(function(g) {
        html += '<section class="time-section">' +
          '<h2>' + g.bucket + ' <span class="count">' + g.artifacts.length + '</span></h2>' +
          '<div class="artifact-list">' +
            g.artifacts.map(renderArtifactCard).join('') +
          '</div>' +
        '</section>';
      });
      container.innerHTML = html;
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // Events
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('sort-newest').addEventListener('click', function() {
      sortNewest = true;
      document.getElementById('sort-newest').classList.add('active');
      document.getElementById('sort-oldest').classList.remove('active');
      render();
    });
    document.getElementById('sort-oldest').addEventListener('click', function() {
      sortNewest = false;
      document.getElementById('sort-oldest').classList.add('active');
      document.getElementById('sort-newest').classList.remove('active');
      render();
    });

    // Initial render
    render();
  </script>
