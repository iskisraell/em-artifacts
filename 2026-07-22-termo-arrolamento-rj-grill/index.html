<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eletromidia | Contrato do Checklist — Termo de Arrolamento RJ (v2)</title>
  <style>
    :root {
      --orange: #FF4F00;
      --black: #000000;
      --white: #FFFFFF;
      --purple: #4E18FF;
      --yellow: #FECC14;
      --pink: #F577ED;
      --green: #3D7700;
      --red: #DC2626;
      --blue: #2563EB;
      --surface: #FAFAFA;
      --muted: #F5F5F5;
      --line: #E5E5E5;
      --text: #737373;
      --radius: 18px;
      --mono: Consolas, "Cascadia Mono", "Courier New", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    ::selection { background: var(--orange); color: var(--white); }
    ::-moz-selection { background: var(--orange); color: var(--white); }

    html, body { overflow-x: hidden; }

    body {
      background-color: var(--surface);
      background-image: radial-gradient(#E8E8E8 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--black);
      font-family: "Rethink Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    button { font: inherit; cursor: pointer; }
    ul, ol { padding-left: 20px; }
    li { margin-bottom: 6px; }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0 0 0 0); white-space: nowrap; border: 0;
    }

    :focus-visible { outline: 3px solid var(--purple); outline-offset: 2px; }

    .app {
      width: min(680px, 100%);
      margin: 0 auto;
      padding: 14px 12px 150px;
      min-height: 100vh;
    }

    .doc-hero {
      position: relative; isolation: isolate; overflow: hidden;
      background: var(--black); color: var(--white);
      border-radius: var(--radius);
      padding: 20px 18px 26px;
      margin-bottom: 14px;
    }

    .doc-hero::before, .doc-hero::after {
      content: ""; position: absolute; z-index: -1;
      aspect-ratio: 1; border-radius: 30px;
    }

    .doc-hero::before {
      right: 44px; bottom: -96px;
      width: 230px; background: var(--orange);
      transform: rotate(10deg);
    }

    .doc-hero::after {
      right: -58px; bottom: -70px;
      width: 190px; background: var(--purple);
      transform: rotate(-8deg);
    }

    .doc-top {
      display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap;
      font-family: var(--mono); font-size: 11px; letter-spacing: .12em;
      text-transform: uppercase; color: #B0B0B0;
      margin-bottom: 18px;
    }

    .doc-top b { color: var(--yellow); font-weight: 400; }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 14px; padding: 7px 11px;
      border-radius: 999px; background: var(--yellow);
      color: var(--black); font-weight: 800;
      text-transform: uppercase; font-size: 11px;
      letter-spacing: .08em;
    }

    .doc-hero h1 {
      font-size: clamp(34px, 9.5vw, 52px);
      line-height: .94; font-weight: 800;
      letter-spacing: -.01em; max-width: 13ch;
      margin-bottom: 16px;
    }

    .doc-hero h1 em { font-style: normal; color: var(--orange); }

    .doc-meta { display: flex; flex-wrap: wrap; gap: 8px; position: relative; z-index: 1; }

    .meta-chip {
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      padding: 8px 11px; border-radius: 10px;
      border: 1px solid #3A3A3A; color: #EDEDED; background: rgba(255,255,255,.04);
    }

    .meta-chip b { color: var(--yellow); font-weight: 700; }

    .stats {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px; margin-bottom: 14px;
    }

    .stat {
      background: var(--white); border: 1px solid var(--line);
      border-radius: 14px; padding: 12px 14px;
      transition: transform .15s, border-color .15s;
    }

    .stat:hover { transform: translateY(-2px); border-color: var(--black); }

    .stat b {
      display: block; font-family: var(--mono);
      font-size: clamp(20px, 5.6vw, 26px); line-height: 1;
      margin-bottom: 4px;
    }

    .stat:nth-child(1) b { color: var(--orange); }
    .stat:nth-child(2) b { color: var(--purple); }
    .stat:nth-child(3) b { color: var(--green); }
    .stat:nth-child(4) b { color: var(--black); }

    .stat span { font-size: 12px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .04em; }

    .clause {
      background: var(--white); border: 1px solid var(--line);
      border-left: 6px solid var(--black);
      border-radius: 14px; padding: 16px;
      margin-bottom: 10px;
      transition: transform .15s;
    }

    .clause:hover { transform: translateX(3px); }
    .clause.c-green { border-left-color: var(--green); }
    .clause.c-purple { border-left-color: var(--purple); }
    .clause.c-orange { border-left-color: var(--orange); }

    .clause .k {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--text);
      margin-bottom: 8px;
    }

    .clause .k i {
      font-style: normal; background: var(--black); color: var(--white);
      border-radius: 6px; padding: 2px 7px;
    }

    .clause h2 { font-size: 19px; font-weight: 800; line-height: 1.15; margin-bottom: 8px; }
    .clause p { font-size: 14.5px; color: #525252; margin-bottom: 8px; }
    .clause p:last-child { margin-bottom: 0; }
    .clause li { font-size: 14.5px; color: #525252; }
    .clause li::marker { color: var(--orange); font-weight: 800; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 48px; padding: 12px 18px;
      border-radius: 12px; border: 2px solid var(--black);
      font-weight: 800; font-size: 16px; line-height: 1.1;
      background: var(--white); color: var(--black);
      transition: transform .12s, background .15s, color .15s, border-color .15s;
      text-align: center;
    }

    .btn:active { transform: scale(.97); }
    .btn.primary { background: var(--black); color: var(--white); }
    .btn.primary:hover { background: var(--orange); border-color: var(--orange); }
    .btn.ghost:hover { background: var(--black); color: var(--white); }
    .btn.sun { background: var(--yellow); color: var(--black); border-color: var(--black); }
    .btn.sun:hover { background: var(--black); color: var(--yellow); }
    .btn.flame { background: var(--orange); color: var(--white); border-color: var(--orange); font-weight: 800; }
    .btn.flame:hover { background: var(--black); border-color: var(--black); }
    .btn.block { width: 100%; }
    .btn.small { min-height: 44px; font-size: 14px; padding: 10px 14px; }
    .btn.danger-ghost { border-color: var(--red); color: var(--red); }
    .btn.danger-ghost:hover { background: var(--red); color: var(--white); }

    .intro-actions { display: grid; gap: 10px; margin: 16px 0 10px; }

    .foot-note {
      font-family: var(--mono); font-size: 11.5px; color: var(--text);
      text-align: center; margin-top: 14px; letter-spacing: .02em;
    }

    .q-head {
      position: sticky; top: 0; z-index: 8;
      background: var(--surface);
      border-bottom: 2px solid var(--black);
      padding: 10px 0 12px; margin-bottom: 16px;
    }

    .q-head-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; margin-bottom: 8px; flex-wrap: wrap;
    }

    .q-count { font-family: var(--mono); font-size: 13px; font-weight: 700; }
    .q-count b { font-size: 17px; color: var(--orange); }

    .q-eta { font-family: var(--mono); font-size: 11.5px; color: var(--text); }

    .q-bar { height: 7px; border-radius: 999px; background: #E4E4E4; overflow: hidden; }
    .q-bar i {
      display: block; height: 100%; width: 0;
      background: var(--orange);
      border-radius: 999px;
      transition: width .4s cubic-bezier(.22, 1, .36, 1);
    }

    .save-flag {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 11px; color: var(--green);
      font-weight: 700;
    }

    .save-flag .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); display: inline-block;
    }

    .save-flag .dot.pulse { animation: pulse .7s ease; }

    @keyframes pulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.9); background: var(--orange); }
      100% { transform: scale(1); }
    }

    .q-theme-pill {
      display: inline-block; margin-bottom: 12px;
      padding: 6px 11px; border-radius: 999px;
      background: var(--purple); color: var(--white);
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .07em;
    }

    fieldset.q-field { border: 0; min-width: 0; }

    legend.q-title {
      font-size: clamp(23px, 6.4vw, 31px);
      font-weight: 800; line-height: 1.08;
      letter-spacing: -.01em; margin-bottom: 10px;
      max-width: 24ch;
    }

    .q-ctx {
      font-family: var(--mono); font-size: 12.5px;
      color: #525252; background: var(--white);
      border: 1px dashed #C9C9C9; border-radius: 10px;
      padding: 9px 11px; margin-bottom: 12px;
      overflow-wrap: anywhere;
    }

    details.aux {
      border: 1px solid var(--line); border-radius: 12px;
      background: var(--white); overflow: hidden;
      margin-bottom: 10px;
    }

    details.aux summary {
      cursor: pointer; padding: 13px 15px;
      font-weight: 800; font-size: 14px; list-style: none;
      display: flex; align-items: center; gap: 8px;
      min-height: 44px;
      transition: background .15s;
    }

    details.aux summary::-webkit-details-marker { display: none; }
    details.aux summary::before { content: "+"; font-weight: 800; color: var(--orange); font-size: 17px; }
    details.aux[open] summary::before { content: "–"; }
    details.aux[open] summary { background: var(--yellow); color: var(--black); }
    details.aux summary:hover { background: var(--muted); }
    details.aux[open] summary:hover { background: var(--yellow); }

    .aux-body { padding: 4px 15px 14px; }
    .aux-body p { font-size: 14px; color: #525252; margin-bottom: 8px; }
    .aux-body li { font-size: 13.5px; color: #525252; }
    .aux-body .ev-src { font-family: var(--mono); font-size: 11px; color: var(--text); display: block; overflow-wrap: anywhere; }

    .opts { display: grid; gap: 10px; margin-top: 14px; }

    .opt {
      position: relative;
      display: grid; grid-template-columns: 26px minmax(0, 1fr);
      gap: 12px; align-items: start;
      padding: 14px; min-height: 56px;
      border: 2px solid var(--line); border-radius: 14px;
      background: var(--white); cursor: pointer;
      transition: border-color .15s, transform .15s, background .15s;
    }

    .opt:hover { border-color: var(--black); transform: translateY(-1px); }
    .opt:focus-within { outline: 3px solid var(--purple); outline-offset: 2px; }

    .opt input { position: absolute; opacity: 0; width: 1px; height: 1px; }

    .opt .box {
      width: 24px; height: 24px; margin-top: 2px;
      border: 2.5px solid var(--black); background: var(--white);
      border-radius: 50%;
      display: grid; place-items: center;
      transition: background .12s;
    }

    .opt .box::after {
      content: ""; width: 10px; height: 10px;
      background: var(--orange); border-radius: 50%;
      transform: scale(0); transition: transform .15s cubic-bezier(.34, 1.56, .64, 1);
    }

    .opt.sel { border-color: var(--orange); background: #FFF3EC; }
    .opt.sel .box::after { transform: scale(1); }

    .opt.prefilled { border-style: dashed; border-color: #B0B0B0; }
    .opt.prefilled .box { border-style: dashed; }

    .opt .l { font-weight: 700; font-size: 16.5px; line-height: 1.25; }
    .opt .fx { font-size: 13.5px; color: #525252; margin-top: 4px; }

    .rec {
      display: inline-block; margin-bottom: 7px;
      background: var(--yellow); color: var(--black);
      font-size: 10.5px; font-weight: 800;
      padding: 4px 9px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: .06em;
    }

    .rec-why {
      font-size: 13px; color: #3F3F3F; margin-top: 7px;
      border-left: 3px solid var(--yellow); padding-left: 9px;
    }

    .note-box { margin-top: 12px; display: none; }
    .note-box.open { display: block; animation: rise .25s ease; }

    .note-box label {
      display: block; font-weight: 800; font-size: 14px; margin-bottom: 6px;
    }

    textarea, input[type="text"] {
      width: 100%; min-height: 88px; resize: vertical;
      padding: 12px 13px; border: 2px solid var(--black);
      border-radius: 12px; background: var(--white);
      font: inherit; font-size: 15.5px; color: var(--black);
    }

    input[type="text"] { min-height: 46px; }

    textarea:focus, input[type="text"]:focus { outline: 3px solid var(--purple); outline-offset: 2px; }

    .char-hint { font-family: var(--mono); font-size: 11px; color: var(--text); margin-top: 5px; }

    .nav-bar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
      background: var(--white); border-top: 2px solid var(--black);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    }

    .nav-inner {
      width: min(680px, 100%); margin: 0 auto;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }

    .nav-inner .btn { min-width: 0; }
    .nav-inner .btn.primary, .nav-inner .btn.sun { flex: 1 1 170px; }

    .banner-open {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between;
      background: var(--yellow); border: 2px solid var(--black);
      border-radius: 14px; padding: 12px 14px; margin-bottom: 12px;
    }

    .banner-open p { font-weight: 800; font-size: 14px; }
    .banner-open .btn { min-height: 44px; font-size: 13.5px; padding: 9px 13px; }

    .pbar-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

    .pchip {
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      padding: 5px 9px; border-radius: 999px;
      border: 1.5px solid var(--line); background: var(--white); color: #525252;
    }

    .pchip b { color: var(--black); }
    .pchip.done { border-color: var(--green); background: #EFF7E6; }
    .pchip.warn { border-color: var(--orange); background: #FFF3EC; }

    .tabs {
      display: flex; gap: 6px; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 6px; margin-bottom: 8px;
      scrollbar-width: thin;
    }

    .tab {
      flex: 0 0 auto; min-height: 44px;
      padding: 9px 13px; border-radius: 11px;
      border: 2px solid var(--black); background: var(--white);
      font-weight: 800; font-size: 13.5px; line-height: 1.1;
      transition: background .15s, color .15s;
    }

    .tab small { display: block; font-family: var(--mono); font-weight: 400; font-size: 10px; color: var(--text); }
    .tab[aria-pressed="true"] { background: var(--black); color: var(--white); }
    .tab[aria-pressed="true"] small { color: var(--yellow); }
    .tab:hover { background: var(--yellow); color: var(--black); }
    .tab[aria-pressed="true"]:hover { background: var(--black); color: var(--white); }

    .filters {
      display: flex; gap: 6px; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 6px; margin-bottom: 12px;
      scrollbar-width: thin;
    }

    .chip {
      flex: 0 0 auto; min-height: 40px;
      padding: 8px 12px; border-radius: 999px;
      border: 1.5px solid var(--black); background: var(--white);
      font-weight: 800; font-size: 12.5px;
      transition: background .15s, color .15s;
    }

    .chip:hover { background: var(--muted); }
    .chip[aria-pressed="true"] { background: var(--orange); border-color: var(--orange); color: var(--white); }

    .badge {
      display: inline-block; padding: 4px 9px; border-radius: 999px;
      font-size: 10.5px; font-weight: 800; line-height: 1.2;
      text-transform: uppercase; letter-spacing: .04em;
      vertical-align: middle;
    }

    .badge.conflict { background: var(--yellow); color: var(--black); border: 1.5px solid var(--black); }
    .badge.altered { background: var(--purple); color: var(--white); }
    .badge.override { background: var(--white); color: var(--orange); border: 1.5px solid var(--orange); }
    .badge.matrix { background: var(--muted); color: #525252; border: 1px solid var(--line); font-family: var(--mono); text-transform: none; }
    .badge.ok { background: var(--green); color: var(--white); }
    .badge.pend { background: var(--white); color: var(--orange); border: 1.5px solid var(--orange); }
    .badge.removed { background: var(--white); color: var(--red); border: 1.5px solid var(--red); }
    .badge.skip { background: var(--muted); color: var(--text); border: 1.5px solid var(--line); }

    .semocc {
      border: 2px dashed var(--red); border-radius: 14px;
      background: #FFF8F8; padding: 14px; margin-bottom: 12px;
    }

    .semocc h3 { font-size: 15.5px; font-weight: 800; margin-bottom: 6px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .semocc p { font-size: 13px; color: #525252; margin-bottom: 10px; }

    .semocc-opts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }

    .semocc-opt {
      min-height: 48px; padding: 10px 12px; border-radius: 11px;
      border: 2px solid var(--black); background: var(--white);
      font-weight: 800; font-size: 13.5px;
      transition: background .15s, color .15s;
    }

    .semocc-opt[aria-pressed="true"] { background: var(--black); color: var(--white); }
    .semocc-opt:hover { background: var(--yellow); color: var(--black); }
    .semocc-opt[aria-pressed="true"]:hover { background: var(--black); color: var(--white); }

    .global-note {
      font-family: var(--mono); font-size: 11.5px; color: var(--text);
      border: 1px dashed #C9C9C9; border-radius: 10px;
      padding: 9px 11px; margin-bottom: 12px; overflow-wrap: anywhere;
    }

    .sec {
      border: 1px solid var(--line); border-radius: 16px;
      background: var(--white); overflow: hidden; margin-bottom: 12px;
    }

    .sec > summary {
      cursor: pointer; list-style: none;
      padding: 13px 15px; min-height: 48px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--black); color: var(--white);
      transition: background .15s;
    }

    .sec > summary::-webkit-details-marker { display: none; }
    .sec > summary::before { content: "+"; font-weight: 800; color: var(--yellow); font-size: 18px; }
    .sec[open] > summary::before { content: "–"; }
    .sec > summary:hover { background: #1C1C1C; }

    .sec-letter {
      font-family: var(--mono); font-weight: 700; font-size: 15px;
      background: var(--orange); color: var(--white);
      border-radius: 8px; padding: 3px 9px;
    }

    .sec-title { font-weight: 800; font-size: 14.5px; text-transform: uppercase; letter-spacing: .05em; flex: 1 1 auto; }
    .sec-count { font-family: var(--mono); font-size: 11px; color: #CFCFCF; }

    .bulk-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 10px 12px; border-bottom: 1px solid var(--line);
      background: var(--muted);
    }

    .bulk-btn {
      flex: 1 1 auto; min-width: 84px; min-height: 44px;
      padding: 8px 10px; border-radius: 10px;
      border: 2px solid var(--black); background: var(--white);
      font-weight: 800; font-size: 12.5px;
      transition: background .15s, color .15s;
    }

    .bulk-btn:hover { background: var(--black); color: var(--white); }
    .bulk-btn.reco { background: var(--yellow); }
    .bulk-btn.reco:hover { background: var(--black); color: var(--yellow); }

    .field-card {
      padding: 13px 14px 14px; border-top: 1px solid var(--line);
      display: grid; gap: 9px;
      transition: background .15s;
    }

    .field-card:first-of-type { border-top: 0; }
    .field-card:hover { background: #FDFDFD; }
    .field-card.has-conflict { background: #FFFBEA; }
    .field-card.has-conflict:hover { background: #FFF7D6; }

    .fc-top { display: flex; flex-wrap: wrap; gap: 6px 8px; align-items: center; }
    .fc-label { font-weight: 800; font-size: 15.5px; line-height: 1.25; flex: 1 1 100%; }
    .fc-key { font-family: var(--mono); font-size: 10.5px; color: var(--text); overflow-wrap: anywhere; }

    .seg {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px;
    }

    .seg-btn {
      display: flex; align-items: center; gap: 8px;
      min-height: 46px; padding: 8px 11px;
      border-radius: 11px; border: 2px solid var(--line);
      background: var(--white); font-weight: 800; font-size: 13.5px;
      color: #404040; text-align: left;
      transition: border-color .15s, background .15s, color .15s, transform .12s;
    }

    .seg-btn:active { transform: scale(.97); }
    .seg-btn:hover { border-color: var(--black); }

    .seg-btn .sdot {
      width: 11px; height: 11px; border-radius: 50%;
      flex: 0 0 auto;
    }

    .seg-btn[data-v="required"] .sdot { background: var(--orange); }
    .seg-btn[data-v="optional"] .sdot { background: var(--purple); }
    .seg-btn[data-v="na"] .sdot { background: #A3A3A3; }
    .seg-btn[data-v="conditional"] .sdot { background: var(--yellow); }

    .seg-btn[aria-pressed="true"] { background: var(--black); border-color: var(--black); color: var(--white); }
    .seg-btn[aria-pressed="true"][data-v="required"] { background: var(--orange); border-color: var(--orange); }

      transition: background .15s, color .15s;
      overflow-wrap: anywhere;

    .gate-pill[aria-pressed="true"] { background: var(--yellow); }

    .photo-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      min-height: 44px;
    }

    .switch {

      border-radius: 999px; border: 2px solid var(--black);
      background: #E4E4E4; transition: background .15s;
    }

    .switch::after {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--white); border: 2px solid var(--black);
      transition: left .15s;
    }

    .switch[aria-checked="true"] { background: var(--green); }
    .switch[aria-checked="true"]::after { left: 26px; }
    .switch[aria-disabled="true"] { opacity: .35; cursor: not-allowed; }

    .sw-wrap { display: inline-flex; min-height: 44px; min-width: 58px; align-items: center; }

    .empty-filter {
      padding: 16px 15px; font-size: 13px; color: var(--text);
      border-top: 1px solid var(--line);
    }

    .rev-head h2 {
      font-size: clamp(27px, 7.6vw, 36px); font-weight: 800;
      line-height: 1; margin-bottom: 6px;
    }

    .rev-head p { font-size: 14.5px; color: #525252; margin-bottom: 14px; }

    .rev-counters { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 14px; }

    .rev-counter {
      border-radius: 14px; padding: 12px 10px; text-align: center;
      border: 1px solid var(--line); background: var(--white);
    }

    .rev-counter b {
      display: block; font-family: var(--mono);
      font-size: clamp(22px, 6.4vw, 30px); line-height: 1; margin-bottom: 4px;
    }

    .rev-counter span { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--text); }
    .rev-counter.ok b { color: var(--green); }
    .rev-counter.pend b { color: var(--orange); }
    .rev-counter.off b { color: var(--purple); }
    .rev-counter.dark b { color: var(--black); }

      transition: background .15s, color .15s;

    .rev-edit:hover { background: var(--black); color: var(--white); }

      background: var(--black); color: var(--white);

      margin-top: 16px; position: relative; overflow: hidden; isolation: isolate;

    .export-card::after {
      content: ""; position: absolute; z-index: -1;

    .export-actions { display: grid; gap: 10px; position: relative; z-index: 1; }

    .json-wrap { margin-top: 14px; position: relative; z-index: 1; border-color: #333; background: #111; }
    .json-wrap summary { color: var(--yellow); }
    .json-wrap[open] summary { background: transparent; color: var(--yellow); }
    .json-wrap summary:hover { background: #1C1C1C; }

    .json-pre {
      margin: 0 12px 12px; padding: 13px;
      background: #0A0A0A; border: 1px solid #333; border-radius: 12px;
      color: var(--yellow); font-family: var(--mono); font-size: 11.5px;
      white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word;
      max-height: 300px; overflow-y: auto;
    }

    .danger-zone { margin-top: 18px; text-align: center; }

    .toast {
      position: fixed; bottom: 92px; left: 50%; transform: translate(-50%, 16px);
      padding: 13px 20px; border-radius: 12px;
      background: var(--black); color: var(--white);
      border: 2px solid var(--yellow);
      font-weight: 700; font-size: 14px; z-index: 100;
      opacity: 0; transition: opacity .25s, transform .25s;

    }

    .toast.visible { opacity: 1; transform: translate(-50%, 0); }

    .rise { animation: rise .3s ease both; }
    .rise-1 { animation-delay: .03s; }
    .rise-2 { animation-delay: .06s; }
    .rise-3 { animation-delay: .09s; }
    .rise-4 { animation-delay: .12s; }
    .rise-5 { animation-delay: .15s; }
    .rise-6 { animation-delay: .18s; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 460px) {
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .rev-counters { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .seg { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }

    function fieldDef(key) {
      for (var i = 0; i < FIELDS.length; i++) if (FIELDS[i].key === key) return FIELDS[i];
      return null;
    }

    function sectionLabel(id) {
      for (var i = 0; i < SECTIONS.length; i++) if (SECTIONS[i].id === id) return SECTIONS[i].label;
      return id;
    }

    function scopeLabel(id) {
      for (var i = 0; i < SCOPES.length; i++) if (SCOPES[i].id === id) return SCOPES[i].l;
      return id;
    }

    function isConflict(key) { return CONFLICT_KEYS.indexOf(key) !== -1; }

    function recoFor(scope, key) {
      return (RECO[scope] && RECO[scope][key]) || RECO.base[key];
    }

    function recoPhoto(r) { return !(r.a === "na" || r.a === "removed"); }

    function stField(state, scope, key) {
      return state.fields[scope] ? state.fields[scope][key] : null;
    }

    function eff(state, scope, key) {
      if (scope !== "base") {
        var sm = stField(state, scope, key);
        if (sm) {
          var offm = sm.a === "na" || sm.a === "removed";
          return { a: sm.a, c: sm.a === "conditional" ? (sm.c || null) : null, cn: sm.cn || "", photo: offm ? false : sm.photo !== false };
        }
        if (RECO[scope] && RECO[scope][key]) {
          var rm = RECO[scope][key];
          return { a: rm.a, c: rm.a === "conditional" ? (rm.c || null) : null, cn: "", photo: recoPhoto(rm) };
        }
        return eff(state, "base", key);
      }
      var s = stField(state, "base", key);
      if (s) {
        var off = s.a === "na" || s.a === "removed";
        return { a: s.a, c: s.a === "conditional" ? (s.c || null) : null, cn: s.cn || "", photo: off ? false : s.photo !== false };
      }
      var rb = RECO.base[key];
      return { a: rb.a, c: rb.a === "conditional" ? (rb.c || null) : null, cn: "", photo: recoPhoto(rb) };
    }

    function isReviewed(state, scope, key) { return !!stField(state, scope, key); }

    function isAltered(state, scope, key) {
      var s = stField(state, scope, key);
      if (!s) return false;
      var r = recoFor(scope, key);
      var rc = r.a === "conditional" ? (r.c || null) : null;
      var sc = s.a === "conditional" ? (s.c || null) : null;
      return s.a !== r.a || sc !== rc;
    }

    function defaultGate(key) {
      return DIGITAL_KEYS.indexOf(key) !== -1 ? "digital_panel_present" : "static_panel_present";
    }

    function archRec(d) {
      for (var i = 0; i < d.options.length; i++) if (d.options[i].rec) return d.options[i];
      return d.options[0];
    }

    function archValue(state, id) {
      var a = state.arch[id];
      return a ? a.value : null;
    }

    function progress(state) {
      var archD = ARCH.filter(function (d) { return !!state.arch[d.id]; }).length;
      var rev = FIELDS.filter(function (f) { return isReviewed(state, "base", f.key); }).length;
      var conf = CONFLICT_KEYS.filter(function (k) { return !!stField(state, "base", k); }).length;
      var secs = SECTIONS.filter(function (sec) {
        return FIELDS.filter(function (f) { return f.section === sec.id && !isConflict(f.key); })
          .every(function (f) { return isReviewed(state, "base", f.key); });
      }).length;
      return {
        archD: archD, archT: ARCH.length,
        rev: rev, fieldT: FIELDS.length,
        conf: conf, confT: CONFLICT_KEYS.length,
        secs: secs, secT: SECTIONS.length,
        pct: Math.round(((archD + rev) / (ARCH.length + FIELDS.length)) * 100)
      };
    }

    function unresolved(state) {
      var out = [];
      ARCH.forEach(function (d) {
        if (!state.arch[d.id]) out.push({ type: "architecture", id: d.id, label: d.title });
      });
      CONFLICT_KEYS.forEach(function (k) {
        if (!stField(state, "base", k)) out.push({ type: "conflict", id: k, label: fieldDef(k).label + " — divergência catálogo × matriz" });
      });
      FIELDS.forEach(function (f) {
        if (!isReviewed(state, "base", f.key)) out.push({ type: "field", id: f.key, label: f.label + " — campo não revisado" });
      });
      return out;
    }

    function photoPolicy(state) {
      var hard = archValue(state, "photo_policy") === "hard_cap";
      return {
        baseline: ["frontal", "traseira", "lateral_esquerda", "lateral_direita", "placa", "serie"],
        perNonConformity: true,
        softWarningAt: hard ? null : 14,
        hardCap: hard ? 14 : null,
        pagination: true
      };
    }

    function fieldExport(state, scope, key) {
      var f = fieldDef(key);
      var e = eff(state, scope, key);
      var o = {
        key: key,
        label: f.label,
        section: f.section,
        applicability: e.a,
        condition: e.c || null,
        photoRule: e.photo ? "required_on_non_conformity" : "off",
        sourceMatrix: f.m.abrigos,
        reviewed: isReviewed(state, scope, key),
        conflict: isConflict(key)
      };
      if (e.c === "outro" && e.cn) o.conditionNote = e.cn;
      return o;
    }

    function buildExport(state) {
      var base = {};
      FIELDS.forEach(function (f) { base[f.key] = fieldExport(state, "base", f.key); });

      var overrides = {};
      ["39", "40", "41"].forEach(function (sc) {
        overrides[sc] = {};
        FIELDS.forEach(function (f) {
          overrides[sc][f.key] = fieldExport(state, sc, f.key);
        });
      });

      var unr = unresolved(state);
      var p = progress(state);
      var byApp = { required: 0, optional: 0, na: 0, conditional: 0, removed: 0 };
      FIELDS.forEach(function (f) { byApp[eff(state, "base", f.key).a]++; });

      var archOut = {};
      ARCH.forEach(function (d) {
        var a = state.arch[d.id];
        if (a) {
          archOut[d.id] = { value: a.value, label: a.label, recommended: !!a.recommended, notes: a.notes || "" };
        } else {
          archOut[d.id] = { value: null, status: "open", recommendedDefault: archRec(d).v };
        }
      });

      return {
        schemaVersion: SCHEMA_VERSION,
        artifact: ARTIFACT,
        generatedAt: new Date().toISOString(),
        priorDecisions: PRIOR.slice(),
        evidenceFacts: {
          facts: FACTS.slice(),
          sources: EVIDENCE.map(function (e) { return { id: e.id, label: e.label, source: e.source }; })
        },
        architectureDecisions: archOut,
        fieldContract: { base: base, modelOverrides: overrides },
        photoPolicy: photoPolicy(state),
        unresolved: unr,
        completion: {
          architecture: { decided: p.archD, total: p.archT },
          fields: { reviewed: p.rev, total: p.fieldT, pending: p.fieldT - p.rev, byApplicability: byApp },
          conflicts: { resolved: p.conf, total: p.confT },
          sectionsApproved: { approved: p.secs, total: p.secT }
        }
      };
    }

          else if (k.indexOf("on") === 0) n.addEventListener(k.slice(2), attrs[k]);

    function setField(scope, key, patch) {
      var cur = eff(state, scope, key);
      var next = {
        a: patch.a || cur.a,
        c: ("c" in patch) ? patch.c : cur.c,
        cn: ("cn" in patch) ? patch.cn : (cur.cn || ""),
        photo: ("photo" in patch) ? patch.photo : cur.photo,
        reviewed: true
      };
      if (next.a !== "conditional") next.c = null;
      if (next.a === "na" || next.a === "removed") next.photo = false;
      state.fields[scope] = state.fields[scope] || {};
      state.fields[scope][key] = next;
      save();
      renderFields();
    }

    function clearOverride(scope, key) {
      if (state.fields[scope] && state.fields[scope][key]) {
        delete state.fields[scope][key];
        save();
        renderFields();
        showToast("Override removido — herdando da Base.");
      }
    }

    function bulkAction(scope, secId, action) {
      var keys = FIELDS.filter(function (f) { return f.section === secId && !isConflict(f.key); }).map(function (f) { return f.key; });
      var conflictsInSection = FIELDS.filter(function (f) { return f.section === secId && isConflict(f.key); }).length;

      var overwrites = keys.filter(function (k) {
        var s = stField(state, scope, k);
        if (!s) return false;
        var target = action === "reco" ? recoFor(scope, k).a : action;
        return s.a !== target;
      }).length;

      var verb = action === "reco" ? "aceitar a recomendação em" : ("marcar como " + action + " em");
      if (overwrites > 0 && !window.confirm("Substituir " + overwrites + " escolha(s) já revisada(s)? Vai " + verb + " " + keys.length + " campos da seção " + secId + ".")) return;

      state.fields[scope] = state.fields[scope] || {};
      keys.forEach(function (k) {
        var r = recoFor(scope, k);
        var a = action === "reco" ? r.a : action;
        var c = null;
        if (a === "conditional") c = (action === "reco" && r.c) ? r.c : defaultGate(k);
        var off = a === "na" || a === "removed";
        state.fields[scope][k] = { a: a, c: c, cn: "", photo: !off, reviewed: true };
      });
      save();
      renderFields();
      var msg = keys.length + " campos atualizados na seção " + secId + " (" + scopeLabel(scope) + ").";
      if (conflictsInSection > 0) msg += " " + conflictsInSection + " conflito(s) exigem decisão manual.";
      showToast(msg);
      announce(msg);
    }

    function matchesFilter(scope, key) {
      var f = ui.filter;
      if (f === "all") return true;
      if (f === "conflitos") return isConflict(key);
      if (f === "alterados") return isAltered(state, scope, key);
      if (f === "digitais") return DIGITAL_KEYS.indexOf(key) !== -1;
      if (f === "pendentes") return !isReviewed(state, scope, key);
      return true;
    }

    function fieldCard(scope, key) {
      var f = fieldDef(key);
      var e = eff(state, scope, key);
      var reviewed = isReviewed(state, scope, key);
      var altered = isAltered(state, scope, key);
      var conflict = isConflict(key);
      var hasOverride = scope !== "base" && !!stField(state, scope, key);

      var seg = el("div", { class: "seg", role: "group", "aria-label": "Aplicabilidade de " + f.label });

        }, [el("span", { class: "sdot", "aria-hidden": "true" }), el("span", { text: ap.l })]);
        seg.appendChild(btn);
      });

              announce("Gate de " + f.label + ": " + g.l);
            }
          }));
        });
        card.appendChild(gateRow);
        if (e.c === "outro") {
          var inp = el("input", {
            type: "text", id: "gatenote_" + scope + "_" + key,
            maxlength: "140", placeholder: "Descreva o gate (ex.: subtipo híbrido no cadastro)",
            "aria-label": "Descrição do gate outro para " + f.label
          });
          inp.value = e.cn || "";
          inp.addEventListener("change", function () {
            ui.scroll = window.scrollY;
            setField(scope, key, { a: "conditional", c: "outro", cn: inp.value });
          });
          card.appendChild(inp);
        }
      }

      var disabled = e.a === "na" || e.a === "removed";
      var photoRow = el("div", { class: "photo-row" });
      photoRow.appendChild(el("span", { class: "pl" }, [
        el("span", { text: "Foto em não conformidade" }),
        el("small", { text: disabled ? "desabilitada para N/A" : "required_on_non_conformity" })
      ]));
      photoRow.appendChild(el("span", { class: "sw-wrap" }, [
        el("button", {
          class: "switch", type: "button", role: "switch",
          id: "photo_" + scope + "_" + key,
          "aria-checked": e.photo ? "true" : "false",
          "aria-disabled": disabled ? "true" : "false",
          "aria-label": "Regra de foto para " + f.label,
          onclick: function () {

            ui.focus = "photo_" + scope + "_" + key;
            ui.scroll = window.scrollY;
            setField(scope, key, { photo: !e.photo });
            announce("Regra de foto de " + f.label + ": " + (!e.photo ? "ligada" : "desligada"));
          }
        })
      ]));
      card.appendChild(photoRow);

      if (hasOverride) {
        card.appendChild(el("button", {
          class: "rev-edit", type: "button", text: "Limpar override (herdar Base)",
          id: "clear_" + scope + "_" + key,
          onclick: function () {
            ui.focus = "app_" + scope + "_" + key + "_" + eff(state, "base", key).a;
            ui.scroll = window.scrollY;
            clearOverride(scope, key);
          }
        }));
      }

      return card;
    }

    function renderFields() {
      var app = $("#app");
      app.innerHTML = "";
      var p = progress(state);
      var scope = ui.tab;
      var openArch = p.archT - p.archD;

      app.appendChild(el("div", { class: "q-head" }, [

        ])
      ]));

      if (openArch > 0) {

        ]));

      var FILTERS = [

            announce("Filtro " + fl.l);
          }
        }));
      });
      app.appendChild(filters);

      if (scope === "base") {
        app.appendChild(semOcorrenciaCard());
      } else {
        var eSem = eff(state, "base", "semOcorrencia");
        app.appendChild(el("p", { class: "global-note", text: "semOcorrencia — Sem ocorrência: " + (eSem.a === "removed" ? "proposto para remoção" : "mantido obrigatório") + " (decisão global, editável na aba Base)." }));
      }

      SECTIONS.forEach(function (sec) {
        var secFields = FIELDS.filter(function (f) { return f.section === sec.id && f.key !== "semOcorrencia"; });
        var visible = secFields.filter(function (f) { return matchesFilter(scope, f.key); });
        var reviewedIn = secFields.filter(function (f) { return isReviewed(state, scope, f.key); }).length;

        var det = el("details", { class: "sec", id: "sec_" + sec.id });
        if (ui.open[sec.id]) det.setAttribute("open", "");
        det.appendChild(el("summary", {}, [
          el("span", { class: "sec-letter", text: sec.id }),
          el("span", { class: "sec-title", text: sec.label }),
          el("span", { class: "sec-count", text: secFields.length + " campos · " + reviewedIn + " revistos" })
        ]));
        det.addEventListener("toggle", function () { ui.open[sec.id] = det.open; });

        var bulk = el("div", { class: "bulk-bar", role: "group", "aria-label": "Ações em lote da seção " + sec.id });
        [
          { a: "reco", l: "Aceitar reco", cls: "reco" },
          { a: "required", l: "Obrigatório", cls: "" },
          { a: "optional", l: "Opcional", cls: "" },
          { a: "na", l: "N/A", cls: "" }
        ].forEach(function (b) {
          bulk.appendChild(el("button", {
            class: "bulk-btn " + b.cls, type: "button",
            id: "bulk_" + scope + "_" + sec.id + "_" + b.a,
            text: b.l,
            onclick: function () {
              ui.focus = "bulk_" + scope + "_" + sec.id + "_" + b.a;
              ui.scroll = window.scrollY;
              bulkAction(scope, sec.id, b.a);
            }
          }));
        });
        det.appendChild(bulk);

        if (visible.length === 0) {
          det.appendChild(el("p", { class: "empty-filter", text: "Nenhum campo da seção " + sec.id + " neste filtro." }));
        } else {
          visible.forEach(function (f) { det.appendChild(fieldCard(scope, f.key)); });
        }

        app.appendChild(det);
      });

      app.appendChild(navBar(
        "← Arquitetura",
        function () { gotoScreen("arch", ARCH.length - 1); },
        "Revisar →",
        function () { gotoScreen("review"); }
      ));

      announce("Editor de campos, aba " + scopeLabel(scope) + ". Progresso " + p.pct + "%.");
      window.scrollTo({ top: ui.scroll || 0 });
      restoreFocus();
    }

    function copyText(text, okMsg) {
      function fallback() {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        var ok = false;
        try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
        document.body.removeChild(ta);
        showToast(ok ? okMsg : "Não foi possível copiar — use Baixar .json");
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () { showToast(okMsg); }, fallback);
      } else {
        fallback();
      }
    }

    function downloadJson(text) {
      var blob = new Blob([text], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "termo-arrolamento-rj-contrato-v2.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 800);
      showToast("Download iniciado: termo-arrolamento-rj-contrato-v2.json");
    }

    function scopeCounts(scope) {
      var c = { required: 0, optional: 0, na: 0, conditional: 0, removed: 0 };
      FIELDS.forEach(function (f) { c[eff(state, scope, f.key).a]++; });
      return c;
    }

    function renderReview() {
      var app = $("#app");
      app.innerHTML = "";
      var payload = buildExport(state);
      var p = progress(state);
      var unr = payload.unresolved;
      var altered = FIELDS.filter(function (f) { return isAltered(state, "base", f.key); });

      app.appendChild(el("div", { class: "rev-head rise" }, [
        el("span", { class: "q-theme-pill", text: "Revisão final" }),
        el("h2", { text: "Contrato por modelo" }),
        el("p", { text: "Contagens efetivas por escopo (Base + overrides), pendências rotuladas e exportação. Draft pode ser exportado com pendências — o prompt bloqueia implementação enquanto houver unresolved." })
      ]));

      app.appendChild(el("div", { class: (unr.length === 0 ? "go-strip go" : "go-strip nogo") + " rise rise-1" }, [
        el("span", { text: unr.length === 0 ? "Pronto para reconciliação" : "Draft — " + unr.length + " pendência(s) bloqueante(s)" }),
        el("small", { text: unr.length === 0 ? "Todas as decisões de arquitetura fechadas e conflitos resolvidos." : "Resolva as pendências listadas abaixo antes do agent-loop." })
      ]));

      app.appendChild(el("div", { class: "rev-counters rise rise-2" }, [
        el("div", { class: "rev-counter ok" }, [el("b", { text: p.rev + "/" + p.fieldT }), el("span", { text: "campos revisados" })]),
        el("div", { class: "rev-counter pend" }, [el("b", { text: String(unr.length) }), el("span", { text: "bloqueantes" })]),
        el("div", { class: "rev-counter off" }, [el("b", { text: String(altered.length) }), el("span", { text: "fora da reco." })]),
        el("div", { class: "rev-counter dark" }, [el("b", { text: p.archD + "/" + p.archT }), el("span", { text: "decisões arch" })])
      ]));

      SCOPES.forEach(function (sc, si) {
        var c = scopeCounts(sc.id);
        var card = el("section", { class: "model-card rise rise-" + Math.min(si + 1, 6) });
        card.appendChild(el("h3", {}, [
          el("span", { text: sc.id === "base" ? "Base Abrigos (contrato geral)" : "Override · " + sc.l + " (modelo " + sc.id + ")" }),
          el("span", { class: "mc-count", text: sc.sub })
        ]));

        card.appendChild(el("div", { class: "mc-chips" }, [
          el("span", { class: "mc-chip req", text: c.required + " obrigatório(s)" }),
          el("span", { class: "mc-chip opt", text: c.optional + " opcional(is)" }),
          el("span", { class: "mc-chip na", text: (c.na + c.removed) + " N/A" }),
          el("span", { class: "mc-chip cond", text: c.conditional + " condicional(is)" })
        ]));

        var list = el("ul", { class: "mc-list" });
        var rows = 0;

        FIELDS.forEach(function (f) {
          var e = eff(state, sc.id, f.key);
          if (e.a === "conditional") {
            list.appendChild(el("li", {}, [
              el("b", { text: f.label + " " }),
              el("span", { text: "→ condicional em " + (e.c === "outro" ? ("outro: " + (e.cn || "sem descrição")) : e.c) })
            ]));
            rows++;
          }
        });

        if (sc.id !== "base") {
          FIELDS.forEach(function (f) {
            if (!stField(state, sc.id, f.key)) return;
            var eb = eff(state, "base", f.key);
            var es = eff(state, sc.id, f.key);
            list.appendChild(el("li", {}, [
              el("b", { text: f.label + " " }),
              el("span", { text: "override do usuário: " + es.a + (es.a !== eb.a ? " (base: " + eb.a + ")" : "") })
            ]));
            rows++;
          });
        }

        CONFLICT_KEYS.forEach(function (k) {
          var resolved = !!stField(state, "base", k);
          var e = eff(state, sc.id, k);
          list.appendChild(el("li", {}, [
            el("b", { text: fieldDef(k).label + " " }),
            el("span", { class: "badge " + (resolved ? "ok" : "conflict"), text: resolved ? ("conflito resolvido (" + e.a + ")") : "conflito aberto" })
          ]));
          rows++;
        });

        if (rows === 0) list.appendChild(el("li", { text: "Sem condicionais, overrides ou conflitos neste escopo — herda a Base." }));
        card.appendChild(list);
        app.appendChild(card);
      });

      var openArch = ARCH.filter(function (d) { return !state.arch[d.id]; });
      if (openArch.length) {
        var gArch = el("section", { class: "rev-group rise" });
        gArch.appendChild(el("h3", { text: "Decisões de arquitetura abertas (" + openArch.length + ")" }));
        openArch.forEach(function (d) {
          gArch.appendChild(el("div", { class: "rev-row" }, [
            el("p", { class: "q", text: d.title }),
            el("p", { class: "a", text: "Recomendação padrão: " + archRec(d).l }),
            el("button", {
              class: "rev-edit", type: "button", text: "Decidir",
              onclick: function () { gotoScreen("arch", ARCH.indexOf(d)); }
            })
          ]));
        });
        app.appendChild(gArch);
      }

      if (unr.length) {
        var gUnr = el("section", { class: "rev-group rise" });
        gUnr.appendChild(el("h3", { text: "Pendências bloqueantes (" + unr.length + ")" }));
        unr.forEach(function (u) {
          gUnr.appendChild(el("div", { class: "rev-row" }, [
            el("p", { class: "q", text: u.label }),
            el("p", { class: "a", text: u.type === "conflict" ? "Conflito catálogo × matriz — exige decisão manual na aba Base." : "Decisão de arquitetura em aberto." })
          ]));
        });
        app.appendChild(gUnr);
      }

      app.appendChild(el("details", { class: "aux rise", style: "margin-bottom:12px" }, [
        el("summary", { text: "Ver evidências (fatos e fontes)" }),
        el("div", { class: "aux-body" }, [
          el("ul", {}, FACTS.map(function (f) { return el("li", { text: f }); })),
          evidenceList()
        ])
      ]));

      var jsonStr = JSON.stringify(payload, null, 2);
      var exportCard = el("section", { class: "export-card rise" }, [
        el("h3", { text: "Exportar contrato" }),
        el("p", { text: "JSON schema " + SCHEMA_VERSION + ": decisões v1, fatos, arquitetura, base + overrides por modelo (39/40/41), política de fotos e pendências. Sem dados pessoais." })
      ]);
      exportCard.appendChild(el("div", { class: "export-actions" }, [
        el("button", { class: "btn sun block", type: "button", text: "Copiar JSON", onclick: function () { copyText(JSON.stringify(payload, null, 2), "JSON copiado — cole de volta no chat."); } }),
        el("button", { class: "btn flame block", type: "button", text: "Copiar prompt + JSON", onclick: function () { copyText(promptText(payload), "Prompt + JSON copiados — cole no agente."); } }),
        el("button", { class: "btn block", style: "background:#fff;color:#000;border-color:#fff", type: "button", text: "Baixar .json", onclick: function () { downloadJson(JSON.stringify(payload, null, 2)); } })
      ]));
      exportCard.appendChild(el("details", { class: "aux json-wrap" }, [
        el("summary", { text: "Pré-visualizar JSON" }),
        el("pre", { class: "json-pre", text: jsonStr })
      ]));
      app.appendChild(exportCard);

      app.appendChild(el("div", { class: "danger-zone" }, [
        el("button", { class: "btn danger-ghost small", type: "button", text: "Recomeçar v2", onclick: resetV2 })
      ]));

      app.appendChild(navBar(
        "← Campos",
        function () { gotoScreen("fields"); },
        "Copiar prompt + JSON",
        function () { copyText(promptText(payload), "Prompt + JSON copiados — cole no agente."); },
        "sun"
      ));

      announce("Revisão final. " + p.rev + " de " + p.fieldT + " campos revisados, " + unr.length + " pendências bloqueantes, " + altered.length + " fora da recomendação.");
      window.scrollTo({ top: 0 });
    }

    function render() {
      var c = state.cur || { s: "intro" };
      if (c.s === "arch") { renderArch(c.i || 0); return; }
      if (c.s === "fields") { renderFields(); return; }
      if (c.s === "review") { renderReview(); return; }
      renderIntro(false);
    }

    var hadSaved = load();
    renderIntro(!!hadSaved);

    window.CONTRACT = {
      buildExport: buildExport,
      progress: progress,
      unresolved: unresolved,
      eff: eff,
      isAltered: isAltered,
      promptText: promptText,
      FIELDS: FIELDS,
      ARCH: ARCH,
      RECO: RECO,
      EVIDENCE: EVIDENCE,
      SCHEMA_VERSION: SCHEMA_VERSION,
      STORAGE_KEY: STORAGE_KEY,
      getState: function () { return state; }
    };
    Object.defineProperty(window.CONTRACT, "state", {
      enumerable: true,
      get: function () { return state; }
    });
  })();
  </script>
</body>
</html>
