<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eletromidia | Grill de Decisões — Termo de Arrolamento RJ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF4F00;
      --black: #000000;
      --white: #FFFFFF;
      --purple: #4E18FF;
      --yellow: #FECC14;
      --pink: #F577ED;
      --green: #3D7700;
      --red: #DC2626;
      --blue: #2563EB;
      --surface: #FAFAFA;
      --muted: #F5F5F5;
      --line: #E5E5E5;
      --text: #737373;
      --radius: 18px;
      --mono: Consolas, "Cascadia Mono", "Courier New", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    ::selection { background: var(--orange); color: var(--white); }
    ::-moz-selection { background: var(--orange); color: var(--white); }

    html, body { overflow-x: hidden; }

    body {
      background-color: var(--surface);
      background-image: radial-gradient(#E8E8E8 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--black);
      font-family: "Rethink Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    button { font: inherit; cursor: pointer; }
    ul, ol { padding-left: 20px; }
    li { margin-bottom: 6px; }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0 0 0 0); white-space: nowrap; border: 0;
    }

    :focus-visible { outline: 3px solid var(--purple); outline-offset: 2px; }

    .app {
      width: min(600px, 100%);
      margin: 0 auto;
      padding: 14px 14px 140px;
      min-height: 100vh;
    }

    /* ---------- Intro: cabeçalho de documento ---------- */
    .doc-hero {
      position: relative; isolation: isolate; overflow: hidden;
      background: var(--black); color: var(--white);
      border-radius: var(--radius);
      padding: 20px 20px 26px;
      margin-bottom: 14px;
    }

    .doc-hero::before, .doc-hero::after {
      content: ""; position: absolute; z-index: -1;
      aspect-ratio: 1; border-radius: 30px;
    }

    .doc-hero::before {
      right: 44px; bottom: -96px;
      width: 230px; background: var(--orange);
      transform: rotate(10deg);
    }

    .doc-hero::after {
      right: -58px; bottom: -70px;
      width: 190px; background: var(--purple);
      transform: rotate(-8deg);
    }

    .doc-top {
      display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap;
      font-family: var(--mono); font-size: 11px; letter-spacing: .12em;
      text-transform: uppercase; color: #B0B0B0;
      margin-bottom: 18px;
    }

    .doc-top b { color: var(--yellow); font-weight: 400; }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 14px; padding: 7px 11px;
      border-radius: 999px; background: var(--yellow);
      color: var(--black); font-weight: 800;
      text-transform: uppercase; font-size: 11px;
      letter-spacing: .08em;
    }

    .doc-hero h1 {
      font-size: clamp(36px, 10.5vw, 54px);
      line-height: .94; font-weight: 800;
      letter-spacing: -.01em; max-width: 12ch;
      margin-bottom: 16px;
    }

    .doc-hero h1 em { font-style: normal; color: var(--orange); }

    .doc-meta { display: flex; flex-wrap: wrap; gap: 8px; position: relative; z-index: 1; }

    .meta-chip {
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      padding: 8px 11px; border-radius: 10px;
      border: 1px solid #3A3A3A; color: #EDEDED; background: rgba(255,255,255,.04);
    }

    .meta-chip b { color: var(--yellow); font-weight: 700; }

    /* ---------- Faixa de números ---------- */
    .stats {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px; margin-bottom: 14px;
    }

    .stat {
      background: var(--white); border: 1px solid var(--line);
      border-radius: 14px; padding: 12px 14px;
      transition: transform .15s, border-color .15s;
    }

    .stat:hover { transform: translateY(-2px); border-color: var(--black); }

    .stat b {
      display: block; font-family: var(--mono);
      font-size: clamp(20px, 5.6vw, 26px); line-height: 1;
      margin-bottom: 4px;
    }

    .stat:nth-child(1) b { color: var(--orange); }
    .stat:nth-child(2) b { color: var(--purple); }
    .stat:nth-child(3) b { color: var(--green); }
    .stat:nth-child(4) b { color: var(--black); }

    .stat span { font-size: 12px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .04em; }

    /* ---------- Resumo 30s: cláusulas ---------- */
    .clause {
      background: var(--white); border: 1px solid var(--line);
      border-left: 6px solid var(--black);
      border-radius: 14px; padding: 16px;
      margin-bottom: 10px;
      transition: transform .15s;
    }

    .clause:hover { transform: translateX(3px); }
    .clause.c-green { border-left-color: var(--green); }
    .clause.c-purple { border-left-color: var(--purple); }
    .clause.c-orange { border-left-color: var(--orange); }

    .clause .k {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--text);
      margin-bottom: 8px;
    }

    .clause .k i {
      font-style: normal; background: var(--black); color: var(--white);
      border-radius: 6px; padding: 2px 7px;
    }

    .clause h2 { font-size: 19px; font-weight: 800; line-height: 1.15; margin-bottom: 8px; }
    .clause p { font-size: 14.5px; color: #525252; margin-bottom: 8px; }
    .clause p:last-child { margin-bottom: 0; }
    .clause li { font-size: 14.5px; color: #525252; }
    .clause li::marker { color: var(--orange); font-weight: 800; }

    .theme-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .theme-chip {
      font-size: 12px; font-weight: 800; padding: 6px 10px;
      border-radius: 999px; border: 1.5px solid var(--black);
      background: var(--white); transition: background .15s, color .15s;
      cursor: default;
    }

    .theme-chip:hover { background: var(--black); color: var(--white); }

    /* ---------- Botões ---------- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 48px; padding: 12px 18px;
      border-radius: 12px; border: 2px solid var(--black);
      font-weight: 800; font-size: 16px; line-height: 1.1;
      background: var(--white); color: var(--black);
      transition: transform .12s, background .15s, color .15s, border-color .15s;
      text-align: center;
    }

    .btn:active { transform: scale(.97); }
    .btn.primary { background: var(--black); color: var(--white); }
    .btn.primary:hover { background: var(--orange); border-color: var(--orange); }
    .btn.ghost:hover { background: var(--black); color: var(--white); }
    .btn.sun { background: var(--yellow); color: var(--black); border-color: var(--black); }
    .btn.sun:hover { background: var(--black); color: var(--yellow); }
    .btn.flame { background: var(--orange); color: var(--black); border-color: var(--black); font-weight: 800; }
    .btn.flame:hover { background: var(--black); color: var(--white); }
    .btn.block { width: 100%; }
    .btn.small { min-height: 44px; font-size: 14px; padding: 10px 14px; }
    .btn.danger-ghost { border-color: var(--red); color: var(--red); }
    .btn.danger-ghost:hover { background: var(--red); color: var(--white); }

    .intro-actions { display: grid; gap: 10px; margin: 16px 0 10px; }

    .foot-note {
      font-family: var(--mono); font-size: 11.5px; color: var(--text);
      text-align: center; margin-top: 14px; letter-spacing: .02em;
    }

    /* ---------- Cabeçalho fixo de progresso ---------- */
    .q-head {
      position: sticky; top: 0; z-index: 8;
      background: var(--surface);
      border-bottom: 2px solid var(--black);
      padding: 10px 0 12px; margin-bottom: 18px;
    }

    .q-head-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; margin-bottom: 8px; flex-wrap: wrap;
    }

    .q-count { font-family: var(--mono); font-size: 13px; font-weight: 700; }
    .q-count b { font-size: 17px; color: var(--orange); }

    .q-eta { font-family: var(--mono); font-size: 11.5px; color: var(--text); }

    .q-bar { height: 7px; border-radius: 999px; background: #E4E4E4; overflow: hidden; }
    .q-bar i {
      display: block; height: 100%; width: 0;
      background: linear-gradient(90deg, var(--orange), var(--purple));
      border-radius: 999px;
      transition: width .4s cubic-bezier(.22, 1, .36, 1);
    }

    .save-flag {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 11px; color: var(--green);
      font-weight: 700;
    }

    .save-flag .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); display: inline-block;
    }

    .save-flag .dot.pulse { animation: pulse .7s ease; }

    @keyframes pulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.9); background: var(--orange); }
      100% { transform: scale(1); }
    }

    /* ---------- Pergunta ---------- */
    .q-theme-pill {
      display: inline-block; margin-bottom: 12px;
      padding: 6px 11px; border-radius: 999px;
      background: var(--purple); color: var(--white);
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .07em;
    }

    fieldset.q-field { border: 0; min-width: 0; }

    legend.q-title {
      font-size: clamp(24px, 6.8vw, 32px);
      font-weight: 800; line-height: 1.06;
      letter-spacing: -.01em; margin-bottom: 10px;
      max-width: 22ch;
    }

    .q-ctx {
      font-family: var(--mono); font-size: 12.5px;
      color: #525252; background: var(--white);
      border: 1px dashed #C9C9C9; border-radius: 10px;
      padding: 9px 11px; margin-bottom: 12px;
      overflow-wrap: anywhere;
    }

    details.aux {
      border: 1px solid var(--line); border-radius: 12px;
      background: var(--white); overflow: hidden;
      margin-bottom: 10px;
    }

    details.aux + details.aux { margin-top: 0; }

    details.aux summary {
      cursor: pointer; padding: 13px 15px;
      font-weight: 800; font-size: 14px; list-style: none;
      display: flex; align-items: center; gap: 8px;
      min-height: 44px;
      transition: background .15s;
    }

    details.aux summary::-webkit-details-marker { display: none; }
    details.aux summary::before { content: "+"; font-weight: 800; color: var(--orange); font-size: 17px; }
    details.aux[open] summary::before { content: "–"; }
    details.aux[open] summary { background: var(--yellow); color: var(--black); }
    details.aux summary:hover { background: var(--muted); }
    details.aux[open] summary:hover { background: var(--yellow); }

    .aux-body { padding: 4px 15px 14px; }
    .aux-body p { font-size: 14px; color: #525252; margin-bottom: 8px; }
    .aux-body li { font-size: 13.5px; color: #525252; }
    .aux-body .ev-src { font-family: var(--mono); font-size: 11px; color: var(--text); display: block; overflow-wrap: anywhere; }

    .opts { display: grid; gap: 10px; margin-top: 14px; }

    .opt {
      position: relative;
      display: grid; grid-template-columns: 26px minmax(0, 1fr);
      gap: 12px; align-items: start;
      padding: 14px; min-height: 56px;
      border: 2px solid var(--line); border-radius: 14px;
      background: var(--white); cursor: pointer;
      transition: border-color .15s, transform .15s, background .15s;
    }

    .opt:hover { border-color: var(--black); transform: translateY(-1px); }
    .opt:focus-within { outline: 3px solid var(--purple); outline-offset: 2px; }

    .opt input { position: absolute; opacity: 0; width: 1px; height: 1px; }

    .opt .box {
      width: 24px; height: 24px; margin-top: 2px;
      border: 2.5px solid var(--black); background: var(--white);
      display: grid; place-items: center;
      transition: background .12s;
    }

    .opt .box.radio { border-radius: 50%; }
    .opt .box.check { border-radius: 7px; }

    .opt .box::after {
      content: ""; width: 10px; height: 10px;
      background: var(--orange); border-radius: 50%;
      transform: scale(0); transition: transform .15s cubic-bezier(.34, 1.56, .64, 1);
    }

    .opt .box.check::after { border-radius: 3px; }

    .opt.sel { border-color: var(--orange); background: #FFF3EC; }
    .opt.sel .box::after { transform: scale(1); }

    .opt .l { font-weight: 700; font-size: 16.5px; line-height: 1.25; }
    .opt .fx { font-size: 13.5px; color: #525252; margin-top: 4px; }

    .rec {
      display: inline-block; margin-bottom: 7px;
      background: var(--yellow); color: var(--black);
      font-size: 10.5px; font-weight: 800;
      padding: 4px 9px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: .06em;
    }

    .rec-why {
      font-size: 13px; color: #3F3F3F; margin-top: 7px;
      border-left: 3px solid var(--yellow); padding-left: 9px;
    }

    .note-box { margin-top: 12px; display: none; }
    .note-box.open { display: block; animation: rise .25s ease; }

    .note-box label {
      display: block; font-weight: 800; font-size: 14px; margin-bottom: 6px;
    }

    textarea, input[type="text"] {
      width: 100%; min-height: 96px; resize: vertical;
      padding: 12px 13px; border: 2px solid var(--black);
      border-radius: 12px; background: var(--white);
      font: inherit; font-size: 15.5px; color: var(--black);
    }

    textarea:focus { outline: 3px solid var(--purple); outline-offset: 2px; }

    .char-hint { font-family: var(--mono); font-size: 11px; color: var(--text); margin-top: 5px; }

    /* ---------- Barra de navegação fixa ---------- */
    .nav-bar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
      background: var(--white); border-top: 2px solid var(--black);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    }

    .nav-inner {
      width: min(600px, 100%); margin: 0 auto;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }

    .nav-inner .btn { min-width: 0; }
    .nav-inner .btn.primary { flex: 1 1 180px; }

    /* ---------- Revisão ---------- */
    .rev-head h2 {
      font-size: clamp(28px, 8vw, 38px); font-weight: 800;
      line-height: 1; margin-bottom: 6px;
    }

    .rev-head p { font-size: 14.5px; color: #525252; margin-bottom: 14px; }

    .rev-counters { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-bottom: 16px; }

    .rev-counter {
      border-radius: 14px; padding: 12px 10px; text-align: center;
      border: 1px solid var(--line); background: var(--white);
    }

    .rev-counter b {
      display: block; font-family: var(--mono);
      font-size: clamp(24px, 7vw, 34px); line-height: 1; margin-bottom: 4px;
    }

    .rev-counter span { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--text); }
    .rev-counter.ok b { color: var(--green); }
    .rev-counter.pend b { color: var(--orange); }
    .rev-counter.off b { color: var(--purple); }

    .rev-group {
      border: 1px solid var(--line); border-radius: 16px;
      background: var(--white); overflow: hidden; margin-bottom: 12px;
    }

    .rev-group > h3 {
      background: var(--black); color: var(--white);
      font-size: 12.5px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .07em;
      padding: 11px 15px;
    }

    .rev-row { padding: 13px 15px; border-top: 1px solid var(--line); display: grid; gap: 5px; }
    .rev-row:first-of-type { border-top: 0; }

    .rev-row .q { font-weight: 800; font-size: 15px; line-height: 1.25; }
    .rev-row .a { font-size: 14px; color: #404040; overflow-wrap: anywhere; }
    .rev-row .n { font-size: 12.5px; color: var(--text); font-style: italic; overflow-wrap: anywhere; }

    .rev-badges { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

    .badge {
      display: inline-block; padding: 4px 9px; border-radius: 999px;
      font-size: 10.5px; font-weight: 800; line-height: 1.2;
      text-transform: uppercase; letter-spacing: .04em;
    }

    .badge.pend { background: var(--white); color: var(--orange); border: 1.5px solid var(--orange); }
    .badge.off { background: var(--yellow); color: var(--black); }
    .badge.outro { background: var(--purple); color: var(--white); }
    .badge.ok { background: var(--green); color: var(--white); }
    .badge.skip { background: var(--muted); color: var(--text); border: 1.5px solid var(--line); }

    .rev-edit {
      justify-self: start; min-height: 44px;
      padding: 9px 14px; border-radius: 10px;
      border: 2px solid var(--black); background: var(--white);
      font-weight: 800; font-size: 13.5px;
      transition: background .15s, color .15s;
    }

    .rev-edit:hover { background: var(--black); color: var(--white); }

    .rev-skipped {
      border: 1px dashed #C9C9C9; border-radius: 14px;
      background: var(--muted); padding: 13px 15px; margin-bottom: 12px;
    }

    .rev-skipped h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; color: #525252; }
    .rev-skipped p { font-size: 13px; color: var(--text); }

    /* ---------- Exportação ---------- */
    .export-card {
      background: var(--black); color: var(--white);
      border-radius: var(--radius); padding: 18px 16px;
      margin-top: 16px; position: relative; overflow: hidden; isolation: isolate;
    }

    .export-card::after {
      content: ""; position: absolute; z-index: -1;
      right: -46px; top: -46px; width: 130px; height: 130px;
      border-radius: 26px; background: var(--purple);
      transform: rotate(12deg);
    }

    .export-card h3 { font-size: 21px; font-weight: 800; margin-bottom: 6px; }
    .export-card > p { color: #D6D6D6; font-size: 14px; margin-bottom: 14px; }

    .export-actions { display: grid; gap: 10px; position: relative; z-index: 1; }

    .json-wrap { margin-top: 14px; position: relative; z-index: 1; }

    .json-wrap summary { color: var(--yellow); background: transparent; }
    .json-wrap[open] summary { background: transparent; color: var(--yellow); }

    .json-pre {
      margin-top: 10px; padding: 13px;
      background: #111; border: 1px solid #333; border-radius: 12px;
      color: var(--yellow); font-family: var(--mono); font-size: 11.5px;
      white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word;
      max-height: 300px; overflow-y: auto;
    }

    .danger-zone { margin-top: 18px; text-align: center; }

    /* ---------- Toast / live ---------- */
    .toast {
      position: fixed; bottom: 92px; left: 50%; transform: translate(-50%, 16px);
      padding: 13px 20px; border-radius: 12px;
      background: var(--black); color: var(--white);
      border: 2px solid var(--yellow);
      font-weight: 700; font-size: 14px; z-index: 100;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; max-width: min(92vw, 480px); text-align: center;
    }

    .toast.visible { opacity: 1; transform: translate(-50%, 0); }

    /* ---------- Animações de entrada ---------- */
    .rise { animation: rise .3s ease both; }
    .rise-1 { animation-delay: .03s; }
    .rise-2 { animation-delay: .06s; }
    .rise-3 { animation-delay: .09s; }
    .rise-4 { animation-delay: .12s; }
    .rise-5 { animation-delay: .15s; }
    .rise-6 { animation-delay: .18s; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 420px) {
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app"></main>

  <div class="toast" id="toast" role="status"></div>
  <p class="sr-only" id="live" aria-live="polite"></p>

  <script>
  (function () {
    "use strict";

    /*PURE-START*/
    var SCHEMA_VERSION = "1.0";
    var ARTIFACT = "termo-arrolamento-rj-grill";
    var STORAGE_KEY = "termo-arrolamento-rj-grill:v1";

    var EVIDENCE = [
      { id: "matrix", label: "Matriz revisada (reunião 13/07/2026)", source: "rio-checklist-matrix-tipologias-revisada-reuniao.xlsx" },
      { id: "catalog", label: "Catálogo de campos — 31 keys", source: "rio-checklist-matrix-tipologias-revisada-reuniao.xlsx · aba Catálogo de Campos" },
      { id: "gaps", label: "Gaps e propostas por tema", source: "rio-checklist-matrix-tipologias-revisada-reuniao.xlsx · aba Gaps" },
      { id: "term72", label: "Golden master TERM-72 v002 (vistoria 13/04/2026)", source: "TERM-72-v002-2026-04-24-164441.docx" },
      { id: "jcdecaux", label: "Base JCDecaux — 2.108 linhas / 1.546 abrigos", source: "EFS - JCDecaux.xlsx" },
      { id: "operacoes", label: "Operações — 650 places ativos (estabelecimento 497)", source: "base Operações" },

        return !!a && a.value === "proposta_auditavel";

    }

    function isAnswered(id, answers) {

          optsWrap.appendChild(label);
        });

        fieldset.appendChild(optsWrap);
        fieldset.appendChild(noteBox(q));
      }

      var isLast = idx === vis.length - 1;
      var bar = navBar(
        idx === 0 ? "← Resumo" : "← Anterior",
        function () { gotoCur(idx === 0 ? "intro" : idx - 1); },
        isLast ? "Revisar respostas →" : "Próxima →",
        function () { gotoCur(isLast ? "review" : idx + 1); }
      );
      app.appendChild(bar);

      announce("Pergunta " + (idx + 1) + " de " + vis.length + ". Tema: " + themeLabel(q.theme) + ". " + q.title);
      setTimeout(function () { legend.focus({ preventScroll: false }); }, 80);
    }

    /* ---------- Tela: revisão ---------- */
    function copyText(text, okMsg) {
      function fallback() {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        var ok = false;
        try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
        document.body.removeChild(ta);
        showToast(ok ? okMsg : "Não foi possível copiar — use Baixar .json");
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () { showToast(okMsg); }, fallback);
      } else {
        fallback();
      }
    }

    function downloadJson(text) {
      var blob = new Blob([text], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "termo-arrolamento-rj-decisoes.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 800);
      showToast("Download iniciado: termo-arrolamento-rj-decisoes.json");
    }

    function promptText(payload) {
      return "Aqui estão minhas decisões do grill do Termo de Arrolamento RJ (schema " + payload.schemaVersion + "): " +
        payload.completion.answered + "/" + payload.completion.total + " respondidas, " +
        payload.completion.unresolved + " pendente(s), " + payload.skipped.length + " item(ns) fora do caminho escolhido.\n\n" +
        JSON.stringify(payload, null, 2);
    }

    function renderReview() {
      var vis = visList();
      var unr = unresolvedIds(state.answers);
      var offRec = vis.filter(function (q) {
        var a = state.answers[q.id];
        return a && isAnswered(q.id, state.answers) && a.recommended === false && a.value !== "outro" &&
          !(Array.isArray(a.value) && a.value.indexOf("outro") !== -1);
      });
      var skipped = skippedIds(state.answers);
      var payload = buildExport(state.answers);

      var app = $("#app");
      app.innerHTML = "";

      app.appendChild(el("div", { class: "rev-head rise" }, [
        el("span", { class: "q-theme-pill", text: "Revisão final" }),
        el("h2", { text: "Confira por tema antes de exportar" }),
        el("p", { text: "Toque em Editar para ajustar qualquer resposta. Pendências e escolhas fora da recomendação ficam destacadas — sem julgamento, só sinalização." })
      ]));

      app.appendChild(el("div", { class: "rev-counters rise rise-1" }, [
        el("div", { class: "rev-counter ok" }, [el("b", { text: String(payload.completion.answered) }), el("span", { text: "respondidas" })]),
        el("div", { class: "rev-counter pend" }, [el("b", { text: String(payload.completion.unresolved) }), el("span", { text: "pendências" })]),
        el("div", { class: "rev-counter off" }, [el("b", { text: String(offRec.length) }), el("span", { text: "fora da reco." })])
      ]));

      THEMES.forEach(function (t, ti) {
        var qs = vis.filter(function (q) { return q.theme === t.id; });
        if (!qs.length) return;
        var group = el("section", { class: "rev-group rise rise-" + Math.min(ti + 1, 6) });
        group.appendChild(el("h3", { text: t.l }));
        qs.forEach(function (q) {
          var a = state.answers[q.id];
          var answered = isAnswered(q.id, state.answers);
          var row = el("div", { class: "rev-row" });
          row.appendChild(el("p", { class: "q", text: q.title }));

          var badges = el("div", { class: "rev-badges" });
          var isOutro = answered && (a.value === "outro" || (Array.isArray(a.value) && a.value.indexOf("outro") !== -1));
          if (!answered) {
            badges.appendChild(el("span", { class: "badge " + (q.optional ? "skip" : "pend"), text: q.optional ? "Opcional em branco" : "Pendente" }));
          } else if (isOutro) {
            badges.appendChild(el("span", { class: "badge outro", text: "Precisa de mais contexto" }));
          } else if (a.recommended === false) {
            badges.appendChild(el("span", { class: "badge off", text: "Fora da recomendação" }));
          } else {
            badges.appendChild(el("span", { class: "badge ok", text: "Decidido" }));
          }
          row.appendChild(badges);

          if (answered) {
            row.appendChild(el("p", { class: "a", text: Array.isArray(a.value) ? a.label : (a.value === "texto_livre" ? "Resposta livre registrada" : a.label) }));
            if (a.notes && String(a.notes).trim()) row.appendChild(el("p", { class: "n", text: "Nota: " + a.notes }));
          } else {
            row.appendChild(el("p", { class: "a", text: "Sem resposta registrada." }));
          }

          row.appendChild(el("button", {
            class: "rev-edit", type: "button", text: "Editar",
            onclick: function () {
              var list = visList();
              for (var i = 0; i < list.length; i++) {
                if (list[i].id === q.id) { gotoCur(i); return; }
              }
            }
          }));
          group.appendChild(row);
        });
        app.appendChild(group);
      });

      if (skipped.length) {
        var names = skipped.map(function (id) {
          for (var i = 0; i < QUESTIONS.length; i++) if (QUESTIONS[i].id === id) return QUESTIONS[i].title;
          return id;
        });
        app.appendChild(el("div", { class: "rev-skipped rise" }, [
          el("h3", { text: "Não se aplicaram pelo caminho escolhido (" + skipped.length + ")" }),
          el("p", { text: names.join(" · ") })
        ]));
      }

      var jsonStr = JSON.stringify(payload, null, 2);

      var exportCard = el("section", { class: "export-card rise" }, [
        el("h3", { text: "Exportar decisões" }),
        el("p", { text: "JSON com schema " + SCHEMA_VERSION + ": respostas, itens pulados, pendências, notas e evidências. Sem dados pessoais." })
      ]);
      var actions = el("div", { class: "export-actions" }, [
        el("button", { class: "btn sun block", type: "button", text: "Copiar JSON", onclick: function () { copyText(JSON.stringify(payload, null, 2), "JSON copiado — cole de volta no chat."); } }),
        el("button", { class: "btn flame block", type: "button", text: "Copiar prompt + JSON", onclick: function () { copyText(promptText(payload), "Prompt + JSON copiados — cole no Hermes."); } }),
        el("button", { class: "btn block", style: "background:#fff;color:#000;border-color:#fff", type: "button", text: "Baixar .json", onclick: function () { downloadJson(JSON.stringify(payload, null, 2)); } })
      ]);
      exportCard.appendChild(actions);
      exportCard.appendChild(el("details", { class: "aux json-wrap" }, [
        el("summary", { text: "Pré-visualizar JSON" }),
        el("pre", { class: "json-pre", text: jsonStr })
      ]));
      app.appendChild(exportCard);

      app.appendChild(el("div", { class: "danger-zone" }, [
        el("button", { class: "btn danger-ghost small", type: "button", text: "Reiniciar grill", onclick: resetAll })
      ]));

      var bar = navBar(
        "← Perguntas",
        function () { gotoCur(vis.length - 1); },
        "Copiar prompt + JSON",
        function () { copyText(promptText(payload), "Prompt + JSON copiados — cole no Hermes."); },
        "sun"
      );
      app.appendChild(bar);

      announce("Revisão final. " + payload.completion.answered + " respondidas, " + payload.completion.unresolved + " pendências, " + offRec.length + " fora da recomendação.");
      window.scrollTo({ top: 0 });
    }

    /* ---------- Roteador ---------- */
    function render() {
      if (state.cur === "intro") { renderIntro(false); return; }
      if (state.cur === "review") { renderReview(); return; }
      var vis = visList();
      var idx = typeof state.cur === "number" ? state.cur : 0;
      if (idx < 0) idx = 0;
      if (idx >= vis.length) idx = vis.length - 1;
      state.cur = idx;
      renderQuestion(idx);
    }

    var hadSaved = load();
    if (hadSaved && state.cur !== "intro") {
      renderIntro(true);
    } else if (hadSaved) {
      renderIntro(true);
    } else {
      state.cur = "intro";
      renderIntro(false);
    }

    window.GRILL = {
      buildExport: buildExport,
      visibleQuestions: visibleQuestions,
      skippedIds: skippedIds,
      unresolvedIds: unresolvedIds,
      isAnswered: isAnswered,
      QUESTIONS: QUESTIONS,
      EVIDENCE: EVIDENCE,
      THEMES: THEMES,
      SCHEMA_VERSION: SCHEMA_VERSION
    };
  })();
  </script>
</body>
</html>
